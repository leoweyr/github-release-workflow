<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="bodyGrad" cx="30%" cy="30%" r="70%" fx="30%" fy="30%">
            <stop offset="0%" style="stop-color:#9f7aea;stop-opacity:1" /> <stop offset="100%" style="stop-color:#553c9a;stop-opacity:1" /> </radialGradient>

        <linearGradient id="tentacleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#805ad5;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#6b46c1;stop-opacity:1" />
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
        </filter>
    </defs>

    <circle cx="256" cy="256" r="240" fill="#f7fafc" stroke="#cbd5e0" stroke-width="12"/>

    <g transform="translate(0, 40)" filter="url(#shadow)" />

    <g transform="translate(0, 40)" filter="url(#shadow)">

        <!-- === FAR SIDE (Behind Body) === -->
        
        <!-- Far Back Leg (Trailing Left) - NO SUCKERS -->
        <path d="M140,300 Q60,360 10,350" fill="none" stroke="#553c9a" stroke-width="28" stroke-linecap="round"/>
        
        <!-- Far Front Leg (Planted Right) - WITH SUCKERS -->
        <!-- Curved to grip ground -->
        <path d="M190,300 Q180,380 240,420 T290,430" fill="none" stroke="#553c9a" stroke-width="28" stroke-linecap="round" opacity="0.6"/>
        <!-- Sucker for Far Front Leg -->
        <circle cx="290" cy="430" r="6" fill="#805ad5" opacity="0.6"/> <!-- Darker sucker for depth -->

        <!-- Far Pushing Arm (Reaching Box) -->
        <path d="M170,230 Q250,150 320,200" fill="none" stroke="#553c9a" stroke-width="28" stroke-linecap="round"/>

        <!-- === BODY SHAPE (cx=216) === -->
        <ellipse cx="216" cy="220" rx="110" ry="130" fill="url(#bodyGrad)"/>
        <ellipse cx="160" cy="180" rx="40" ry="25" fill="#ffffff" opacity="0.15" transform="rotate(-10, 160, 180)"/>

        <!-- === FACE (aligned) === -->
        <g transform="translate(0, 0) rotate(5, 296, 220)">
            <!-- Left Eye (Nearer/Perspective) -->
            <circle cx="210" cy="220" r="34" fill="#ffffff" stroke="#4a5568" stroke-width="3"/>
            <circle cx="235" cy="225" r="10" fill="#2d3748"/> 
            <circle cx="239" cy="221" r="3" fill="#ffffff"/> <!-- Shine -->
            
            <!-- Right Eye (Further/Perspective) -->
            <circle cx="290" cy="220" r="30" fill="#ffffff" stroke="#4a5568" stroke-width="3"/>
            <circle cx="315" cy="225" r="9" fill="#2d3748"/> 
            <circle cx="321" cy="221" r="2.5" fill="#ffffff"/> 
            
            <!-- Cheeks/Blush -->
            <ellipse cx="190" cy="250" rx="10" ry="6" fill="#feb2b2" opacity="0.4"/> <!-- Left Cheek -->
            <ellipse cx="330" cy="255" rx="10" ry="6" fill="#feb2b2" opacity="0.5"/> <!-- Right Cheek -->
        </g>

        <!-- === NEAR SIDE (Foreground) === -->

        <!-- Near Back Leg (Trailing Left) - NO SUCKERS -->
        <path d="M160,340 Q100,410 50,390" fill="none" stroke="url(#tentacleGrad)" stroke-width="28" stroke-linecap="round"/>
        
        <!-- Near Front Leg (Planted Right) - WITH SUCKERS -->
        <!-- Curved to grip ground -->
        <path d="M240,340 Q230,410 270,450 T310,460" fill="none" stroke="url(#tentacleGrad)" stroke-width="28" stroke-linecap="round"/>
        <circle cx="310" cy="460" r="6" fill="#d6bcfa" opacity="0.8"/> <!-- Light sucker -->

        <!-- === ARMS & BOX (Modified) === -->

        <!-- Far Arm Contact Hand -->
        <circle cx="320" cy="200" r="14" fill="#805ad5"/>
        <circle cx="320" cy="200" r="6" fill="#d6bcfa" opacity="0.9"/>

        <!-- Near Pushing Arm (Foreground) -->
        <path d="M220,290 Q300,400 320,350" fill="none" stroke="url(#tentacleGrad)" stroke-width="28" stroke-linecap="round"/>
        <circle cx="320" cy="350" r="14" fill="#805ad5"/>
        <circle cx="320" cy="350" r="6" fill="#d6bcfa" opacity="0.9"/>

        <!-- HUGE BOX (Restored to 280 width, position x=310 kept) -->
        <g transform="translate(310, 90)">
            <!-- Front Face (280x300) -->
            <rect x="0" y="50" width="280" height="300" fill="#d97706" stroke="#78350f" stroke-width="3"/>
            <!-- Perspective Top -->
            <path d="M0,50 L40,0 L320,0 L280,50 Z" fill="#f59e0b" stroke="#78350f" stroke-width="3"/>
            <!-- Tape -->
            <rect x="120" y="50" width="30" height="300" fill="#fcd34d" opacity="0.7"/>
            <path d="M120,50 L145,0 L175,0 L150,50 Z" fill="#fcd34d" opacity="0.7"/>
        </g>
    </g>
</svg>
